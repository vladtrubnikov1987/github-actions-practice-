name: First Workflow

on:
  push:
    branches:
      - main

env:
  PROJECT_NAME: github-actions-practice

jobs:
  pre-job:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: echo "Preparation completed" > report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: preparation-report
          path: report.txt

  build:
    needs: pre-job
    runs-on: ubuntu-latest

    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: preparation-report

      - name: Read report
        run: cat report.txt

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show repository files
        run: ls -la

      - name: Print project name
        run: echo "Project is $PROJECT_NAME"
